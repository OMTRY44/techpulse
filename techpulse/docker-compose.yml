version: '3.8'

services:
  # ─── Strapi CMS ───
  strapi:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: techpulse-strapi
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_CLIENT: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: techpulse
      DATABASE_USERNAME: strapi
      DATABASE_PASSWORD: strapi_local
      NODE_ENV: development
    ports:
      - '1337:1337'
    volumes:
      - ./backend:/app
      - /app/node_modules
      - strapi-uploads:/app/public/uploads
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run develop

  # ─── Next.js Frontend ───
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: techpulse-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_STRAPI_URL: http://localhost:1337
      STRAPI_API_TOKEN: ${STRAPI_API_TOKEN:-}
      NODE_ENV: development
    ports:
      - '3000:3000'
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - strapi
    command: npm run dev

  # ─── PostgreSQL ───
  postgres:
    image: postgres:16-alpine
    container_name: techpulse-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: techpulse
      POSTGRES_USER: strapi
      POSTGRES_PASSWORD: strapi_local
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U strapi -d techpulse']
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Adminer (DB UI optionnel) ───
  adminer:
    image: adminer
    container_name: techpulse-adminer
    restart: unless-stopped
    ports:
      - '8080:8080'
    depends_on:
      - postgres

volumes:
  postgres-data:
  strapi-uploads:
